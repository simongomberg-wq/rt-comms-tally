<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Communication Tally</title>
 <style>
    body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }
    button { margin: 5px; padding: 10px; border-radius: 8px; cursor: pointer; }
    #status { font-size: 0.85em; color: #666; min-height: 1.2em; }
    #toolbar { margin-top: 20px; }
    #toolbar button { background: #eee; }
    #infoBadge { font-size: 0.9em; color: #444; margin-bottom: 8px; }
    #changeRole { font-size: 0.8em; margin-left: 10px; padding: 3px 8px; background: none; border: 1px solid #aaa; border-radius: 6px; cursor: pointer; }
 </style>
</head>
<body>
 <h1>Daily Communication Tally</h1>
 <div id="infoBadge"></div>
 <h2 id="total">Total: 0</h2>
 <div id="status"></div>
 <div id="stepContainer"></div>

 <div id="toolbar">
    <button id="undoBtn">Undo last entry</button>
    <button id="exportBtn">Download CSV (backup)</button>
 </div>

<script>
const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbz2Hxi_NnE3Xk_F2AJnt7OPN3apA_AJABWH_c3M7jyZHgQukQHPmmSzebRcQTc0cMdU/exec";

const roles = ["Consultant","SpR","Physics","Pre Treatment Rad","Treatment Rad","RT Admin","Physics Admin"];
const methods = ["Email","Smartpage","EPIC","Aria","Phone Call","Text Message"];
const typeOfCommunicationOptions = [
 "Clinical RT related",
 "Clinical Non RT related",
 "Non-Clinical RT related",
 "Non-Clinical Non RT related"
];
const sendReceiveOptions = ["Send","Receive"];
const correctOptions = ["Correct","Incorrect"];
const urgencyOptions = [
 "Life threatening (now)",
 "Urgent (30 mins)",
 "Semi-urgent (1 hour)",
 "Non-urgent (today)",
 "Non-urgent (tomorrow)"
];

const steps = [
 { title: "1. Method of Communication", options: methods, field: "method" },
 { title: "2. Type of Communication", options: typeOfCommunicationOptions, field: "typeOfCommunication" },
 { title: "3. Send or Receive", options: sendReceiveOptions, field: "direction" },
 { title: "4. Correct Recipient?", options: correctOptions, field: "correct" },
 { title: "5. Urgency", options: urgencyOptions, field: "urgency" }
];

const STORAGE_KEY = "commTallyInteractions";
const USER_KEY = "commTallyUser";
const ROLE_KEY = "commTallyRole";

// --- Resolve user identity from URL or localStorage ---
function getUserId() {
 const params = new URLSearchParams(window.location.search);
 const urlUser = params.get('user');
 if (urlUser) { localStorage.setItem(USER_KEY, urlUser); return urlUser; }
 const stored = localStorage.getItem(USER_KEY);
 if (stored) return stored;
 const entered = prompt('Enter your name (or ask your team lead for your personal link):') || 'Unknown';
 localStorage.setItem(USER_KEY, entered);
 return entered;
}

const userId = getUserId();

// --- Role: remembered across sessions, clearable ---
let savedRole = localStorage.getItem(ROLE_KEY) || '';

function updateInfoBadge() {
 const badge = document.getElementById('infoBadge');
 let html = 'Logged in as: <strong>' + userId + '</strong>';
 if (savedRole) {
    html += ' &nbsp;|&nbsp; Role: <strong>' + savedRole + '</strong>';
    html += ' <button id="changeRole">Change role</button>';
 }
 badge.innerHTML = html;
 if (savedRole) {
    document.getElementById('changeRole').onclick = () => {
      savedRole = '';
      localStorage.removeItem(ROLE_KEY);
      updateInfoBadge();
      stepIndex = 0;
      current = {};
      render();
    };
 }
}

let stepIndex = 0;
let current = {};
let count = parseInt(localStorage.getItem('commTallyCount') || '0', 10);

function saveCount() {
 localStorage.setItem('commTallyCount', count);
}

function setStatus(msg, isError) {
 const el = document.getElementById('status');
 el.innerText = msg;
 el.style.color = isError ? '#c00' : '#666';
}

function render() {
 document.getElementById('total').innerText = 'Total today: ' + count;
 updateInfoBadge();
 const container = document.getElementById('stepContainer');
 container.innerHTML = '';

 // If role not yet set, show role selection first
 if (!savedRole) {
    const h3 = document.createElement('h3');
    h3.innerText = 'First, select your role:';
    container.appendChild(h3);
    roles.forEach(opt => {
      const btn = document.createElement('button');
      btn.innerText = opt;
      btn.onclick = () => {
        savedRole = opt;
        localStorage.setItem(ROLE_KEY, opt);
        stepIndex = 0;
        current = {};
        render();
      };
      container.appendChild(btn);
    });
    return;
 }

 const { title, options, field } = steps[stepIndex];
 const h3 = document.createElement('h3');
 h3.innerText = title;
 container.appendChild(h3);

 options.forEach(opt => {
    const btn = document.createElement('button');
    btn.innerText = opt;
    btn.onclick = () => handleSelect(field, opt);
    container.appendChild(btn);
 });
}

function handleSelect(field, value) {
 current[field] = value;
 if (stepIndex === steps.length - 1) {
    const record = {
      ...current,
      role: savedRole,
      user: userId,
      id: Date.now(),
      timestamp: new Date().toISOString()
    };
    count++;
    saveCount();
    submitToSheet(record);
    current = {};
    stepIndex = 0;
 } else {
    stepIndex++;
 }
 render();
}

function submitToSheet(record) {
 setStatus('Saving...', false);
 fetch(SHEET_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(record)
 })
 .then(res => res.ok ? setStatus('Saved ✓', false) : setStatus('Entry counted locally; sync to sheet failed.', true))
 .catch(() => setStatus('Entry counted locally; no internet connection to sync.', true));
}

function exportCsv() {
 setStatus('CSV export is a local backup only — check the Google Sheet for full data.', false);
}

document.getElementById('undoBtn').onclick = () => {
 if (count === 0) return;
 count--;
 saveCount();
 render();
 setStatus('Count reduced by 1 (note: sheet row cannot be undone remotely).', false);
};
document.getElementById('exportBtn').onclick = exportCsv;

render();
</script>
</body>
</html>

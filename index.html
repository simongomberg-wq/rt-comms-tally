<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Communication Tally</title>
 <style>
    body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }
    button { margin: 5px; padding: 10px; border-radius: 8px; cursor: pointer; }
    #status { font-size: 0.85em; color: #666; min-height: 1.2em; }
    #toolbar { margin-top: 20px; }
    #toolbar button { background: #eee; }
    #infoBadge { font-size: 0.9em; color: #444; margin-bottom: 8px; }
 </style>
</head>
<body>
 <h1>Daily Communication Tally</h1>
 <div id="infoBadge"></div>
 <h3 id="dateDisplay" style="margin-bottom:4px;color:#555;"></h3>
 <h2 id="total">Total today: 0</h2>
 <div id="status"></div>
 <div id="stepContainer"></div>

 <div id="toolbar">
    <button id="undoBtn">Undo last entry</button>
 </div>

<script>
const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbz2Hxi_NnE3Xk_F2AJnt7OPN3apA_AJABWH_c3M7jyZHgQukQHPmmSzebRcQTc0cMdU/exec";

const methods = ["Email","Smartpage","EPIC","Aria","Phone Call","Text Message","Teams","Other"];
const typeOfCommunicationOptions = [
 "Clinical RT related",
 "Clinical Non RT related",
 "Non-Clinical RT related",
 "Non-Clinical Non RT related"
];
const sendReceiveOptions = ["Send","Receive"];
const correctOptions = ["Correct","Incorrect"];
const urgencyOptions = [
 "Life threatening (now)",
 "Urgent (30 mins)",
 "Semi-urgent (1 hour)",
 "Non-urgent (today)",
 "Non-urgent (tomorrow)"
];

const steps = [
 { title: "1. Method of Communication", options: methods, field: "method" },
 { title: "2. Type of Communication", options: typeOfCommunicationOptions, field: "typeOfCommunication" },
 { title: "3. Send or Receive", options: sendReceiveOptions, field: "direction" },
 { title: "4. Correct Recipient?", options: correctOptions, field: "correct" },
 { title: "5. Urgency", options: urgencyOptions, field: "urgency" }
];

const USER_KEY = "commTallyUser";
const ROLE_KEY = "commTallyRole";
const COUNT_KEY = "commTallyCount";
const DATE_KEY = "commTallyDate";

function getParam(key) {
 return new URLSearchParams(window.location.search).get(key);
}

// Resolve user — URL param takes priority, then localStorage
const urlUser = getParam('user');
if (urlUser) localStorage.setItem(USER_KEY, urlUser);
const userId = localStorage.getItem(USER_KEY) || 'Unknown';

// Resolve role — URL param takes priority, then localStorage
const urlRole = getParam('role');
if (urlRole) localStorage.setItem(ROLE_KEY, urlRole);
const userRole = localStorage.getItem(ROLE_KEY) || '';

document.getElementById('infoBadge').innerHTML =
 'Logged in as: <strong>' + userId + '</strong>' +
 (userRole ? ' &nbsp;|&nbsp; Role: <strong>' + userRole + '</strong>' : '');

const today = new Date().toISOString().slice(0, 10);
const storedDate = localStorage.getItem(DATE_KEY);
if (storedDate !== today) {
 localStorage.setItem(DATE_KEY, today);
 localStorage.setItem(COUNT_KEY, '0');
}

document.getElementById('dateDisplay').innerText =
 new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

let stepIndex = 0;
let current = {};
let count = parseInt(localStorage.getItem(COUNT_KEY) || '0', 10);

function saveCount() { localStorage.setItem(COUNT_KEY, count); }

function setStatus(msg, isError) {
 const el = document.getElementById('status');
 el.innerText = msg;
 el.style.color = isError ? '#c00' : '#666';
}

function render() {
 document.getElementById('total').innerText = 'Total today: ' + count;
 const container = document.getElementById('stepContainer');
 container.innerHTML = '';

 const { title, options, field } = steps[stepIndex];
 const h3 = document.createElement('h3');
 h3.innerText = title;
 container.appendChild(h3);

 options.forEach(opt => {
    const btn = document.createElement('button');
    btn.innerText = opt;
    btn.onclick = () => handleSelect(field, opt);
    container.appendChild(btn);
 });
}

function handleSelect(field, value) {
 current[field] = value;
 if (stepIndex === steps.length - 1) {
    const record = {
      ...current,
      role: userRole,
      user: userId,
      id: Date.now(),
      timestamp: new Date().toISOString()
    };
    count++;
    saveCount();
    submitToSheet(record);
    current = {};
    stepIndex = 0;
 } else {
    stepIndex++;
 }
 render();
}

function submitToSheet(record) {
 setStatus('Saving...', false);
 fetch(SHEET_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(record)
 })
 .then(res => res.ok ? setStatus('Saved ✓', false) : setStatus('Entry counted locally; sync to sheet failed.', true))
 .catch(() => setStatus('Entry counted locally; no internet connection to sync.', true));
}

document.getElementById('undoBtn').onclick = () => {
 if (count === 0) return;
 count--;
 saveCount();
 render();
 setStatus('Count reduced by 1 (note: sheet row cannot be undone remotely).', false);
};

render();
</script>
</body>
</html>
